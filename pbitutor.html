<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="icon" type="image/png" href="/icon.ico">

<title>Punjabi Tutor | Typing Exam Portal</title>
	  <link rel="stylesheet" href="styles.css" />
<style>
 :root{
    --bg:#f7f8fb; --card:#fff; --accent:#00295f; --muted:#6b7280;
    --green:#1f9d55; --red:#e03d3d; --blue:#2563eb;
  }
  *{box-sizing:border-box}
  body{
    font-family:Inter, "Bookman old Style", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    margin:0; background:var(--bg); color:#111;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  }

  header{
    padding:22px 28px; display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(90deg,#fff,#f2f4f8); border-bottom:1px solid rgba(0,0,0,0.04);
  }
  header h1{margin:0; font-size:20px; color:var(--accent); letter-spacing:0.2px}
  header p{margin:0; color:var(--muted); font-size:13px}

  main{max-width:1100px;margin:28px auto;padding:0 20px}

  /* LESSON GRID */
  #lessonGrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:22px}
  .lessonBtn{
    background:var(--card); border-radius:12px; padding:18px; box-shadow:0 6px 18px rgba(16,24,40,0.06);
    border:1px solid rgba(2,41,95,0.04); cursor:pointer; text-align:center;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .lessonBtn:hover{transform:translateY(-6px); box-shadow:0 10px 30px rgba(16,24,40,0.08)}
  .lessonBtn h3{margin:0;color:var(--accent);font-size:16px}
  .lessonBtn p{margin:6px 0 0;color:var(--muted);font-size:13px}

  /* TEST AREA */
  #testArea{display:none; margin-top:10px}
  .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .btn{background:var(--accent);color:#fff;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid rgba(2,41,95,0.12)}
  .meta{color:var(--muted);font-size:13px}

  .card{
    background:var(--card); border-radius:12px; padding:18px; box-shadow:0 8px 30px rgba(16,24,40,0.06);
    border:1px solid rgba(2,41,95,0.04);
  }

  /* text display */
  #textDisplay{min-height:140px; padding:14px;border-radius:8px;border:1px dashed rgba(0,0,0,0.06);
    font-size:20px; line-height:1.7; font-family:Arial; white-space:pre-wrap; word-break:break-word;
    background:linear-gradient(180deg,#fff,#fbfdff);
  }

  /* character spans */
  #textDisplay .ch{border-radius:2px;}
  #textDisplay .current{background-color:gold; box-shadow:0 2px 0 rgba(0,0,0,0.06); font-size:20px; font-weight:bold;}
  #textDisplay .correct{background:transparent; color:var(--green); font-weight:600}
  #textDisplay .incorrect{background:transparent; color:var(--red); font-weight:600}
  #textDisplay .space{display:inline-block; min-width:8px; border-bottom:1px dashed rgba(0,0,0,0.03)}

  /* flash animation when wrong pressed */
  @keyframes flashRed {
    0%{background:rgba(224,61,61,0.14)}
    100%{background:transparent}
  }
  .flash { animation: flashRed .45s ease; }

  /* stats */
  .statsGrid{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap}
  .stat{background:#fff;padding:10px 12px;border-radius:10px;box-shadow:0 6px 20px rgba(16,24,40,0.03);font-size:14px}
  .stat strong{display:block;color:var(--accent);font-size:15px}

  /* results area */
  #results{margin-top:16px;padding:12px;border-radius:10px;background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid rgba(2,41,95,0.03)}
  #results h4{margin:0 0 8px;color:var(--accent)}
  #results p{margin:4px 0;color:var(--muted);font-size:14px}

  /* back button */
  .backLink{display:inline-flex;align-items:center;gap:8px;color:var(--accent);cursor:pointer;font-weight:600;margin-bottom:8px}

  @media(max-width:640px){
    #textDisplay{font-size:18px}
  }
  .header {display:flex;justify-content:space-between;align-items:center;padding:15px 40px;animation:fadeDown 1s ease;}
.header img{height:60px;}

	#fullscreenBtn {
  background: white;
  color: Black;
  border-radius: 5px;
  border: none;
  padding: 8px 14px;
  cursor: pointer;
  font-weight: bold;
}

#fullscreenBtn:hover {
  background: #0056b3;
}
html, body {
  height: 100%;
  margin: 0;
}

body {
 
  flex-direction: column;
  min-height: 100vh;
}
</style>
</head>

<body>
<div id="header-container"></div>
<script>
fetch("header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header-container").innerHTML = data;
  });
	// Disable right click
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
});

// Disable keyboard shortcuts
document.addEventListener('keydown', function(e) {
    // Disable: F12, Ctrl+Shift+I/J/C, Ctrl+U, Ctrl+S, Ctrl+C, Ctrl+V, Ctrl+X, Ctrl+A, Ctrl+P
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase())) ||
        (e.ctrlKey && ["U","S","C","V","X","A","P"].includes(e.key.toUpperCase()))
    ) {
        e.preventDefault();
        return false;
    }
});

// Disable copy / paste / cut
["copy", "paste", "cut"].forEach(evt => {
    document.addEventListener(evt, e => e.preventDefault());
});
// -------------------- Helper: Load paragraph from URL param --------------------

 // ensure previous/next by keyboard: PageUp/PageDown
  document.addEventListener('keydown', (e) => {

    if (e.code === 'PageDown' || e.key === 'PageDown') { e.preventDefault(); if (currentChunkIndex < chunks.length-1) { currentChunkIndex++; renderChunk(); } }
    if (e.code === 'PageUp' || e.key === 'PageUp') { e.preventDefault(); if (currentChunkIndex > 0) { currentChunkIndex--; renderChunk(); }
	}
  });
      
document.getElementById('typing-input').addEventListener('keydown', function(e) {
    if (e.key === "Tab") {
        e.preventDefault();
    }
});
// Disable right click
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
});

// Disable keyboard shortcuts
document.addEventListener('keydown', function(e) {
    // Disable: F12, Ctrl+Shift+I/J/C, Ctrl+U, Ctrl+S, Ctrl+C, Ctrl+V, Ctrl+X, Ctrl+A, Ctrl+P
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase())) ||
        (e.ctrlKey && ["U","S","C","V","X","A","P"].includes(e.key.toUpperCase()))
    ) {
        e.preventDefault();
        return false;
    }
});

// Disable copy / paste / cut
["copy", "paste", "cut"].forEach(evt => {
    document.addEventListener(evt, e => e.preventDefault());
});


</script>

<header>
  <div>
    <h1>Punjabi Typing Tutor</h1>
    <p>Strict letter-by-letter tutor — you must type the correct letter to advance.</p>
  </div>
  <div class="meta">Smartech Education</div>
</header>
<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">

    <!-- CLOSE BUTTON -->
    <span class="close" onclick="closePopup()">&times;</span>

    <!-- CLICKABLE IMAGE -->
    <a href="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfCzPcUgy6hDPIqdE82Bn4U5UvS6H6VHehAO5bO7p_3aiFsCA/alreadyresponded?usp=header">
      <img src="poster.png" alt="Typing Tutor Offer" class="popup-img">
    </a>

  </div>
</div>

<style>
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.popup-content {
  position: relative;
  max-width: 800px;
  width: 90%;
}

.popup-img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

.close {
  position: absolute;
  top: -10px;
  right: -10px;
  background: #fff;
  border-radius: 50%;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 20px;
}
</style>

<script>
function closePopup() {
  document.getElementById("popup").style.display = "none";
}
<main>
  <section id="lessonsSection">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2 style="margin:0">Choose a Lesson</h2>
      <div class="meta">Pick any lesson to begin — tests use random words from the lesson.</div>
    </div>
    <div id="lessonGrid" aria-label="lessons grid"></div>
  </section>

  <section id="testArea">
    <div class="backLink" id="backToLessons" title="Back to lessons">← Back to lessons</div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
        <div>
          <h3 id="lessonTitle" style="margin:0;color:var(--accent)"></h3>
          <div class="meta" id="lessonSubtitle"></div>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <button id="restartBtn" class="btn ghost">Restart Lesson</button>
          <button id="newTextBtn" class="btn">New Random Text</button>
        </div>
      </div>

      <hr style="margin:12px 0;border:none;border-top:1px solid rgba(0,0,0,0.04)">

      <div id="textDisplay" aria-live="polite" tabindex="0"></div>

      <div class="statsGrid" style="margin-top:12px">
        <div class="stat"><strong id="time">00:00</strong><small>Time</small></div>
        <div class="stat"><strong id="correctCount">0</strong><small>Correct chars</small></div>
        <div class="stat"><strong id="wrongCount">0</strong><small>Wrong hits</small></div>
        <div class="stat"><strong id="accuracy">0%</strong><small>Accuracy</small></div>
        <div class="stat"><strong id="wpm">0</strong><small>WPM</small></div>
      </div>

      <div id="results" style="display:none">
        <h4>Result</h4>
        <p id="finalSummary">Complete the test to see results here.</p>
      </div>
    </div>
  </section>
</main>

	  function generateRandomText(lessonKey, wordCount = 60){

		const arr = [];
		for(let i=0;i<wordCount;i++){

	  // ---------- render text into spans (per character) ----------
	  function renderText(str){
		textDisplay.innerHTML = '';
		charSpans = [];
		for(let i=0;i<str.length;i++){
		  const ch = str[i];
		  const span = document.createElement('span');
		  span.className = 'ch';
		  // styling for spaces
		  if(ch === ' ') { span.classList.add('space'); span.textContent = ' '; } // show a visible dot for spaces
		  else span.textContent = ch;
		  textDisplay.appendChild(span);
		  charSpans.push({span, char: ch});
		}
		// set first as current
		cursor = 0;
		updateVisuals();
	  }

	  // ---------- visuals update ----------
	  function updateVisuals(){
		charSpans.forEach((obj, idx) => {
		  obj.span.classList.remove('current','correct','incorrect','flash');
		  // show actual space char for readability
		  if(obj.char === ' '){
			obj.span.textContent = ' ';
		  } else obj.span.textContent = obj.char;
		});
		if(cursor < charSpans.length){
		  const c = charSpans[cursor].span;
		  c.classList.add('current');
		  // ensure focused on display so user knows where to type
		  textDisplay.scrollLeft = Math.max(0, c.offsetLeft - 20);
		}
	  }

  resultsBox.style.display = 'none';
  resetStats();
  currentString = generateRandomText(lessonKey, 80);
  renderText(currentString);
  textDisplay.focus();
}
	  // ---------- reset stats ----------
	  function resetStats(){
		stopTimer();
		startedAt = 0;
		errorMap = {};
		correctChars = 0; wrongHits = 0; cursor = 0; running = false;
		correctCountEl.textContent = '0';
		wrongCountEl.textContent = '0';
		accuracyEl.textContent = '0%';
		wpmEl.textContent = '0';
		timeEl.textContent = '00:00';
		finalSummary.textContent = 'Complete the test to see results here.';
	  }

	  // ---------- timer ----------
	  function startTimer(){
		if(startedAt) return;
		startedAt = Date.now();
		running = true;
		timerId = setInterval(updateTimer, 500);
	  }
	  function stopTimer(){
		if(timerId) { clearInterval(timerId); timerId = null; }
		running = false;
	  }
	  function updateTimer(){
		if(!startedAt) return;
		const elapsed = Math.floor((Date.now() - startedAt) / 1000);
		const mm = String(Math.floor(elapsed/60)).padStart(2,'0');
		const ss = String(elapsed%60).padStart(2,'0');
		timeEl.textContent = `${mm}:${ss}`;
		updateWPM();
	  }

	  // ---------- WPM & accuracy ----------
	  function updateWPM(){
		const elapsedMinutes = Math.max( (Date.now() - startedAt) / 60000, 1/60 );
		const wpm = Math.round((correctChars / 5) / elapsedMinutes);
		wpmEl.textContent = String(wpm);
	  }
	  function updateAccuracy(){
		const totalHits = correctChars + wrongHits;
		const acc = totalHits ? Math.round((correctChars / totalHits) * 100) : 0;
		accuracyEl.textContent = acc + '%';
	  }

	  // ---------- key handling (letter-by-letter enforcement) ----------
	  window.addEventListener('keydown', (e) => {
			const ignoreKeys = [
		  'Shift','Control','Alt','Meta','CapsLock','Tab',
		  'ContextMenu','Escape'
		];
		if (ignoreKeys.includes(e.key) || e.key.startsWith('Arrow')) {
		  return; // do nothing
		}
		 if(e.key === 'Backspace'){
		  e.preventDefault();
		  handleBackspace();
		  return;
		}
		// if test area not open or no text, ignore
		if(testArea.style.display !== 'block' || !charSpans.length) return;

		// ignore modifier combos
		if(e.ctrlKey || e.altKey || e.metaKey||e.shift) return;

		// allow back to go back
		if(e.key === 'Backspace'){
		  e.preventDefault();
		  if(cursor === 0) return;
		  // if current wasn't finished, just move back
		  // remove any marks on previous char
		  const prev = charSpans[cursor-1];
		  prev.span.classList.remove('correct','incorrect','flash');
		  cursor = cursor - 1;
		  // if the previous char was counted previously as correct, reduce correct count
		  // (we'll deduce by checking class)
		  // but better to recompute counts from DOM each time:
		  recomputeCountsFromDOM();
		  updateVisuals();
		  return;
		}

		// if already completed, ignore other keys
		if(cursor >= charSpans.length) return;

		// start timer on first valid key press (only when not started)
		if(!startedAt && e.key.length === 1){
		  startTimer();
		}

		// expected char
		const expected = charSpans[cursor].char;
		// interpret enter as newline if exists
		let pressed = e.key;
		// convert ' ' (space) - when user presses space key, e.key === ' '
		// normalize quotes and dashes? We keep it simple.
		// For case-insensitive letters we accept either case:
		// STRICT case-sensitive matching for letters
	if (expected.length === 1 && /[a-zA-Z]/.test(expected)) {
		if (pressed === expected) {
			acceptCorrect();
		} else {
			markWrong();
		}
		e.preventDefault();
		return;
	} else {
		  // non-letter characters (spaces, punctuation, numbers)
		  // For spaces, we expect space key
		  if(expected === ' '){
			if(pressed === ' ') { acceptCorrect(); e.preventDefault(); return; }
			else { markWrong(); e.preventDefault(); return; }
		  } else {
			// other cases: accept exact match (case-sensitive)
			if(pressed === expected){ acceptCorrect(); e.preventDefault(); return; }
			// also accept case-insensitive for letters in other unicode?
			if(pressed.length === 1 && pressed.toLowerCase() === expected.toLowerCase()){
			  acceptCorrect(); e.preventDefault(); return;
			}
			markWrong();
			e.preventDefault();
			return;
		  }
		}
	  });

	  function acceptCorrect(){
		// mark current as correct, advance cursor
		const obj = charSpans[cursor];
		obj.span.classList.remove('current','flash','incorrect');
		obj.span.classList.add('correct');
		cursor++;
		correctChars++;
		correctCountEl.textContent = String(correctChars);
		updateAccuracy();
		updateWPM();
		// if completed
		if(cursor >= charSpans.length){
		  // finish: stop timer and show results
		  stopTimer();
		  showFinalResults();
		} else {
		  updateVisuals();
		}
	  }

function markWrong(){
  wrongHits++;
  wrongCountEl.textContent = String(wrongHits);
  updateAccuracy();

  const expected = charSpans[cursor].char;

  // track error
  if(expected){
    errorMap[expected] = (errorMap[expected] || 0) + 1;
  }

  // flash UI
  const obj = charSpans[cursor];
  obj.span.classList.remove('flash');
  void obj.span.offsetWidth;
  obj.span.classList.add('flash','incorrect');
}

	  function recomputeCountsFromDOM(){
		// useful after backspace: recompute counts
		correctChars = 0; wrongHits = 0;
		charSpans.forEach(obj => {
		  if(obj.span.classList.contains('correct')) correctChars++;
		  // incorrect class represents last wrong press but user didn't advance; we count wrongHits separately
		});
		// wrongHits remains whatever was tracked (we keep count since it's attempts)
		correctCountEl.textContent = String(correctChars);
		wrongCountEl.textContent = String(wrongHits);
		updateAccuracy();
		updateWPM();
	  }

	  // ---------- show final results (in bottom panel) ----------
	  function showFinalResults(){
		// compute final metrics
		const elapsedSeconds = Math.max(1, Math.floor((Date.now() - startedAt) / 1000));
		const minutes = elapsedSeconds / 60;
		const wpm = Math.round((correctChars / 5) / Math.max(minutes, 1/60));
		const totalHits = correctChars + wrongHits;
		const accuracy = totalHits ? Math.round((correctChars / totalHits) * 100) : 0;
			let errorHTML = "";

const sortedErrors = Object.entries(errorMap)
  .sort((a,b) => b[1] - a[1]);

if(sortedErrors.length){
  errorHTML = "<br><br><strong>Most Mistyped Characters:</strong><br>";
  sortedErrors.forEach(([char,count]) => {
    const displayChar = char === " " ? "[space]" : char;
    errorHTML += `${displayChar} → ${count} times<br>`;
  });
}
			
			

	finalSummary.innerHTML = `
  <strong>Completed in ${formatTime(elapsedSeconds)} — WPM: ${wpm} — Accuracy: ${accuracy}%</strong>
  <br>
  Correct characters: ${correctChars} &nbsp; • &nbsp; Wrong hits: ${wrongHits}
  ${errorHTML}
`;
		resultsBox.style.display = 'block';
		// final update of stat boxes
		wpmEl.textContent = String(wpm);
		accuracyEl.textContent = accuracy + '%';
	  }

	  // ---------- utilities ----------
	  function formatTime(totalSeconds){
		const mm = String(Math.floor(totalSeconds/60)).padStart(2,'0');
		const ss = String(totalSeconds%60).padStart(2,'0');
		return `${mm}:${ss}`;
	  }

	  // ---------- UI actions ----------
	backToLessons.addEventListener('click', () => {
  testArea.style.display = 'none';
  lessonsSection.style.display = 'block';

  // ✅ SHOW AGAIN
  document.getElementById("extraSections").style.display = "block";

  resetStats();
});

	restartBtn.addEventListener('click', () => {
  resetStats();
  const wordCount = lessonWordCounts[currentLesson] || 80;
  currentString = generateRandomText(currentLesson, wordCount);
  renderText(currentString);
  resultsBox.style.display = 'none';
  textDisplay.focus();
});

	newTextBtn.addEventListener('click', () => {
  const wordCount = lessonWordCounts[currentLesson] || 80;
  currentString = generateRandomText(currentLesson, wordCount);
  renderText(currentString);
  resetStats();
  resultsBox.style.display = 'none';
  textDisplay.focus();
});

	  // focus clickable textDisplay (so user sees cursor area)
	  textDisplay.addEventListener('click', () => textDisplay.focus());

	  // prevent selection & copy while typing to keep strictness (optional)
	  textDisplay.addEventListener('selectstart', (e) => e.preventDefault());

	  // initial accessibility focus
	  setTimeout(()=> {
		const firstBtn = lessonGrid.querySelector('.lessonBtn');
		if(firstBtn) firstBtn.setAttribute('tabindex','0');
	  }, 200);

	})();

		const fullscreenBtn = document.getElementById('fullscreenBtn');

	fullscreenBtn.addEventListener('click', () => {
	  if (!document.fullscreenElement) {
		// Enter full screen
		document.documentElement.requestFullscreen().catch(err => {
		  alert(`Error enabling full-screen mode: ${err.message}`);
		});
		fullscreenBtn.textContent = "Exit Full Screen";
	  } else {
		// Exit full screen
		document.exitFullscreen();
		fullscreenBtn.textContent = "Full Screen";
	  }
	});
